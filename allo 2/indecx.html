<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق Allo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --sent-bg: linear-gradient(to left, #e3f2fd, #bbdefb);
            --received-bg: linear-gradient(to right, #e8f5e9, #c8e6c9);
            --avatar-sent: linear-gradient(to right, #1a2a6c, #3f51b5);
            --avatar-received: linear-gradient(to left, #b21f1f, #f44336);
            --info-bg: linear-gradient(to right, #ff9800, #ff5722);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        
        .header {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f0f5ff;
            display: flex;
            flex-direction: column;
        }
        
        .chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: white;
            border-radius: 15px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .message {
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            position: relative;
            animation: fadeIn 0.3s ease-in-out;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            max-width: 80%;
            align-self: flex-start;
        }
        
        .message.sent {
            background: var(--sent-bg);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        
        .message.received {
            background: var(--received-bg);
            border-bottom-left-radius: 0;
        }
        
        .message .text {
            line-height: 1.5;
            font-size: 1.05rem;
        }
        
        .message .time {
            font-size: 0.8rem;
            color: #666;
            float: left;
            margin-top: 8px;
        }
        
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            font-weight: bold;
        }
        
        .sent .avatar {
            right: -55px;
            background: var(--avatar-sent);
        }
        
        .received .avatar {
            left: -55px;
            background: var(--avatar-received);
        }
        
        .form-container {
            padding: 20px;
            background-color: white;
            border-top: 1px solid #eee;
        }
        
        .form-group {
            display: flex;
            margin-bottom: 15px;
        }
        
        .form-group input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            margin-left: 10px;
        }
        
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            resize: none;
            height: 80px;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        button {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button i {
            margin-left: 8px;
        }
        
        .info-box {
            background: var(--info-bg);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .timestamp {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin: 10px 0;
        }
        
        .loading {
            text-align: center;
            padding: 10px;
            color: var(--primary);
        }
        
        .message .name {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
            display: block;
        }
        
        @media (max-width: 768px) {
            .container {
                height: 95vh;
                border-radius: 15px;
            }
            
            .message {
                padding: 10px 12px;
                max-width: 75%;
            }
            
            .avatar {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            
            .sent .avatar {
                right: -50px;
            }
            
            .received .avatar {
                left: -50px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .header p {
                font-size: 1rem;
            }
        }
        
        .db-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .db-info h3 {
            margin-bottom: 10px;
            color: white;
        }
        
        .db-info p {
            margin: 5px 0;
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>تطبيق Allo</h1>
            <p>محادثة فورية مع قاعدة بيانات</p>
        </div>
        
        <div class="chat-container">
            <div class="info-box">
                <i class="fas fa-info-circle"></i> تم تمثيل قاعدة البيانات باستخدام IndexedDB في المتصفح
            </div>
            
            <div class="chatbox" id="chatbox">
                <!-- الرسائل ستعرض هنا -->
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> جارٍ تحميل المحادثة...
                </div>
            </div>
        </div>
        
        <div class="form-container">
            <form id="chatForm">
                <div class="form-group">
                    <input type="text" name="name" id="name" placeholder="اسمك" required>
                </div>
                <textarea name="msg" id="msg" placeholder="اكتب رسالتك هنا..." required></textarea>
                <button type="submit">
                    <i class="fas fa-paper-plane"></i> إرسال الرسالة
                </button>
            </form>
        </div>
    </div>
    
    <div class="db-info">
        <h3>معلومات قاعدة البيانات</h3>
        <p>تم تصميم التطبيق ليعمل مع قاعدة بيانات MySQL (تم تمثيلها هنا باستخدام IndexedDB)</p>
        <p>جدول المحادثة يحتوي على: id, name, msg, data</p>
    </div>

    <script>
        // تمثيل قاعدة البيانات باستخدام IndexedDB
        let db;
        const DB_NAME = "chat_db";
        const DB_VERSION = 1;
        const STORE_NAME = "chat";
        
        // تهيئة قاعدة البيانات
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = (event) => {
                    console.error("فشل فتح قاعدة البيانات", event.target.error);
                    reject(event.target.error);
                };
                
                request.onsuccess = (event) => {
                    db = event.target.result;
                    console.log("تم فتح قاعدة البيانات بنجاح");
                    resolve();
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    const objectStore = db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                    objectStore.createIndex("name", "name", { unique: false });
                    objectStore.createIndex("msg", "msg", { unique: false });
                    objectStore.createIndex("data", "data", { unique: false });
                    
                    console.log("تم إنشاء جدول المحادثة");
                    
                    // إضافة بعض الرسائل الافتراضية
                    const defaultMessages = [
                        { name: "محمد", msg: "مرحباً بالجميع! كيف حالكم؟", data: new Date(Date.now() - 86400000).toISOString() },
                        { name: "أحمد", msg: "أهلاً وسهلاً! كل شيء على ما يرام، شكراً", data: new Date(Date.now() - 43200000).toISOString() },
                        { name: "سارة", msg: "هل جربتم التطبيق الجديد؟", data: new Date().toISOString() }
                    ];
                    
                    const transaction = event.target.transaction;
                    const store = transaction.objectStore(STORE_NAME);
                    
                    defaultMessages.forEach(msg => {
                        store.add(msg);
                    });
                };
            });
        }
        
        // إضافة رسالة جديدة
        function addMessage(name, msg) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject("قاعدة البيانات غير مهيأة");
                    return;
                }
                
                const transaction = db.transaction([STORE_NAME], "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                
                const message = {
                    name: name,
                    msg: msg,
                    data: new Date().toISOString()
                };
                
                const request = store.add(message);
                
                request.onsuccess = () => {
                    resolve(request.result);
                };
                
                request.onerror = (event) => {
                    reject(event.target.error);
                };
            });
        }
        
        // جلب جميع الرسائل
        function getAllMessages() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject("قاعدة البيانات غير مهيأة");
                    return;
                }
                
                const transaction = db.transaction([STORE_NAME], "readonly");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                
                request.onsuccess = () => {
                    resolve(request.result);
                };
                
                request.onerror = (event) => {
                    reject(event.target.error);
                };
            });
        }
        
        // عرض الرسائل
        async function displayMessages() {
            try {
                const messages = await getAllMessages();
                const chatbox = document.getElementById("chatbox");
                
                if (messages.length === 0) {
                    chatbox.innerHTML = '<div class="info-box">لا توجد رسائل بعد. كن أول من يرسل رسالة!</div>';
                    return;
                }
                
                let html = "";
                let lastDate = null;
                
                // ترتيب الرسائل حسب التاريخ (من الأقدم للأحدث)
                messages.sort((a, b) => new Date(a.data) - new Date(b.data));
                
                messages.forEach(message => {
                    const dateObj = new Date(message.data);
                    const currentDate = dateObj.toISOString().split('T')[0];
                    
                    // عرض التاريخ فقط إذا كان مختلف
                    if (currentDate !== lastDate) {
                        const formattedDate = `${dateObj.getDate()}/${dateObj.getMonth() + 1}/${dateObj.getFullYear()}`;
                        html += `<div class="timestamp">${formattedDate}</div>`;
                        lastDate = currentDate;
                    }
                    
                    // تنسيق الوقت
                    const hours = dateObj.getHours().toString().padStart(2, '0');
                    const minutes = dateObj.getMinutes().toString().padStart(2, '0');
                    const time = `${hours}:${minutes}`;
                    
                    // تحديد فئة الرسالة
                    const msgClass = (message.name === "محمد") ? 'sent' : 'received';
                    
                    html += `
                    <div class="message ${msgClass}">
                        <div class="avatar">${message.name.charAt(0).toUpperCase()}</div>
                        <div class="text">
                            <strong>${message.name}</strong>
                            <p>${message.msg}</p>
                            <span class="time">${time}</span>
                        </div>
                    </div>
                    `;
                });
                
                chatbox.innerHTML = html;
                
                // التمرير لآخر رسالة
                chatbox.scrollTop = chatbox.scrollHeight;
                
            } catch (error) {
                console.error("حدث خطأ في جلب الرسائل:", error);
                document.getElementById("chatbox").innerHTML = `
                    <div class="info-box">
                        <i class="fas fa-exclamation-triangle"></i> 
                        حدث خطأ في جلب الرسائل: ${error.message}
                    </div>
                `;
            }
        }
        
        // تحديث الرسائل كل 5 ثواني
        function startAutoRefresh() {
            setInterval(displayMessages, 5000);
        }
        
        // تهيئة التطبيق
        async function initApp() {
            try {
                await initDB();
                await displayMessages();
                startAutoRefresh();
                
                // إضافة معالج لإرسال النموذج
                document.getElementById("chatForm").addEventListener("submit", async (e) => {
                    e.preventDefault();
                    
                    const name = document.getElementById("name").value.trim();
                    const msg = document.getElementById("msg").value.trim();
                    
                    if (!name || !msg) {
                        alert("الرجاء إدخال اسمك ورسالتك");
                        return;
                    }
                    
                    try {
                        await addMessage(name, msg);
                        document.getElementById("msg").value = "";
                        await displayMessages();
                    } catch (error) {
                        console.error("حدث خطأ في إرسال الرسالة:", error);
                        alert(`حدث خطأ في إرسال الرسالة: ${error.message}`);
                    }
                });
                
            } catch (error) {
                console.error("حدث خطأ في تهيئة التطبيق:", error);
                document.getElementById("chatbox").innerHTML = `
                    <div class="info-box">
                        <i class="fas fa-exclamation-triangle"></i> 
                        حدث خطأ في تهيئة التطبيق: ${error.message}
                    </div>
                `;
            }
        }
        
        // بدء التطبيق عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
